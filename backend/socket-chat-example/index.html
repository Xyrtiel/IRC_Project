<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socket.IO Chat</title>
  <style>
    body {
      margin: 0;
      padding-bottom: 3rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #form {
      background: rgba(0, 0, 0, 0.15);
      padding: 0.25rem;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      height: 3rem;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }

    #input {
      border: none;
      padding: 0 1rem;
      flex-grow: 1;
      border-radius: 2rem;
      margin: 0.25rem;
    }

    #input:focus {
      outline: none;
    }

    #form > button {
      background: #333;
      border: none;
      padding: 0 1rem;
      margin: 0.25rem;
      border-radius: 3px;
      outline: none;
      color: #fff;
    }

    #messages {
      list-style-type: none;
      margin: 0;
      padding: 0;
      flex-grow: 1;
    }

    #messages > li {
      padding: 0.5rem 1rem;
    }

    #messages > li:nth-child(odd) {
      background: #efefef;
    }

    #usernameInput {
      text-align: center;
      margin-top: 20%;
    }

    #typingIndicator {
      font-size: 0.9rem;
      color: #666;
      padding: 0.5rem 1rem;
      font-style: italic;
      display: none;
    }

    .dots::after {
      content: '';
      display: inline-block;
      animation: dots-animation 1.5s steps(3, end) infinite;
    }

    @keyframes dots-animation {
      0% {
        content: '';
      }
      33% {
        content: '.' ;
      }
      66% {
        content: '..';
      }
      100% {
        content: '...';
      }
    }

    .username-typing {
      font-weight: bold;
    }

    #sidebar {
      width: 200px;
      background: #f4f4f4;
      height: calc(100vh - 3rem);
      position: fixed;
      left: 0;
      top: 0;
      overflow-y: auto;
      padding: 1rem;
    }

    .channel {
      padding: 0.5rem;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .channel:hover {
      background: #ddd;
    }

    .channel.active {
      background: #ddd;
      font-weight: bold;
    }

    .delete-button {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      padding: 0.2rem;
      font-weight: bold;
      border-radius: 50%;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="usernameInput">
    <input type="text" id="username" placeholder="Enter your username" />
    <input type="password" id="password" placeholder="Enter your password" />
    <button onclick="joinChat()">Join Chat</button>
    <p id="errorMessage" class="error" style="display: none;"></p>
  </div>

  <div id="sidebar" style="display: none;">
    <div id="channelSection">
      <input type="text" id="channelName" placeholder="Channel Name" />
      <button onclick="createChannel()">Create Channel</button>
      <ul id="channelsList"></ul>
    </div>
  </div>

  <div style="margin-left: 200px; padding: 1rem;">
    <ul id="messages" style="display: none;"></ul>
    <p id="typingIndicator" style="display: none;">
      <span class="username-typing"></span> is typing
      <span class="dots"></span>
    </p>
    <form id="form" action="" style="display: none;">
      <input id="input" autocomplete="off" placeholder="Type a message..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <div id="privateMessageSection" style="display: none;">
    <input type="text" id="privateRecipient" placeholder="Recipient Username" />
    <input type="text" id="privateMessage" placeholder="Type a private message" />
    <button onclick="sendPrivateMessage()">Send Private Message</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let username = '';
    let password = '';
    let currentChannel = null;
    let channels = [];
    let messagesByChannel = {}; // Store messages by channel

    function joinChat() {
      username = document.getElementById('username').value.trim();
      password = document.getElementById('password').value.trim();

      if (!username || !password) {
        document.getElementById('errorMessage').textContent = 'Username and password are required.';
        document.getElementById('errorMessage').style.display = 'block';
        return;
      }

      socket = io({
        auth: { username, password },
      });

      socket.on('connect', () => {
        document.getElementById('usernameInput').style.display = 'none';
        document.getElementById('form').style.display = 'flex';
        document.getElementById('messages').style.display = 'block';
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('privateMessageSection').style.display = 'block';

        // Listen for incoming messages
        socket.on('chat message', (msg, sender, channel) => {
          if (!messagesByChannel[channel]) {
            messagesByChannel[channel] = [];
          }
          messagesByChannel[channel].push({ sender, msg });

          // Only display messages from the active channel
          if (channel === currentChannel) {
            const item = document.createElement('li');
            item.textContent = `${sender}: ${msg}`;
            document.getElementById('messages').appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
          }
        });

        socket.on('joined channel', (channelName) => {
          currentChannel = channelName;
          updateCurrentChannel();
          loadMessagesForChannel(channelName);
        });

        socket.on('channel list', (channelList) => {
          channels = channelList;
          updateChannelList();
        });

        socket.on('channel created', (channelName) => {
          addChannel(channelName);
        });
      });

      socket.on('auth_error', (msg) => {
        document.getElementById('errorMessage').textContent = msg;
        document.getElementById('errorMessage').style.display = 'block';
      });
    }

    // Function to handle private message sending
    function sendPrivateMessage() {
      const recipient = document.getElementById('privateRecipient').value.trim();
      const message = document.getElementById('privateMessage').value.trim();
      if (recipient && message) {
        socket.emit('private message', message, recipient);
        document.getElementById('privateMessage').value = ''; // Clear the private message input
      }
    }

    function updateCurrentChannel() {
      const channelElements = document.querySelectorAll('.channel');
      channelElements.forEach((channel) => {
        channel.classList.remove('active');
        if (channel.textContent === currentChannel) {
          channel.classList.add('active');
        }
      });
    }

    function loadMessagesForChannel(channelName) {
      const messagesContainer = document.getElementById('messages');
      messagesContainer.innerHTML = ''; // Clear displayed messages

      if (messagesByChannel[channelName]) {
        messagesByChannel[channelName].forEach(({ sender, msg }) => {
          const item = document.createElement('li');
          item.textContent = `${sender}: ${msg}`;
          messagesContainer.appendChild(item);
        });
      }
    }

    function createChannel() {
      const channelName = document.getElementById('channelName').value.trim();
      if (!channelName) return;

      if (channels.some((channel) => channel.name === channelName)) {
        alert('Channel already exists.');
        return;
      }

      socket.emit('create channel', channelName);
      document.getElementById('channelName').value = '';
    }

    function joinChannel(channelName) {
      socket.emit('join channel', channelName);
      currentChannel = channelName;
      updateCurrentChannel();
      loadMessagesForChannel(channelName);
    }

    document.getElementById('form').addEventListener('submit', (event) => {
      event.preventDefault();
      const input = document.getElementById('input');
      const message = input.value.trim();

      if (message && currentChannel) {
        socket.emit('chat message', message, currentChannel);
        input.value = '';
      }
    });

    function addChannel(channelName) {
      const li = document.createElement('li');
      li.classList.add('channel');
      li.textContent = channelName;
      li.onclick = () => joinChannel(channelName);
      document.getElementById('channelsList').appendChild(li);
    }

    // Listeners for private messages
    socket.on('private message', (msg, sender) => {
      const item = document.createElement('li');
      item.textContent = `Private from ${sender}: ${msg}`;
      document.getElementById('messages').appendChild(item);
    });

    // Handle fetching and displaying messages
    socket.on('private messages', (messages) => {
      const privateMessagesContainer = document.getElementById('messages');
      privateMessagesContainer.innerHTML = ''; // Clear previous messages
      messages.forEach(({ sender, recipient, content }) => {
        const item = document.createElement('li');
        item.textContent = `${sender} to ${recipient}: ${content}`;
        privateMessagesContainer.appendChild(item);
      });
    });
  </script>
</body>
</html>
